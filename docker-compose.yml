# This file starts all three parts of the project together with one command:
#   docker compose up
# It also puts them on my own custom network so they can find each other.

services:
  db:
    image: postgres:15
    # the values come from a .env file. if there is no .env file, the part
    # after ":-" is used as a default so the project still runs out of the box.
    # these are only local development values, not real secrets.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-skillmatch}
    ports:
      - "5432:5432"
    # check the database is actually ready to accept connections, not just started.
    # the backend waits for this so it does not try to connect too early.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skillmatch}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - skillmatch-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # if the backend ever starts before the database is reachable, let docker restart it
    restart: on-failure
    # the backend needs the same database settings so it can connect to the db container
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-skillmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-skillmatch}
    # share the data folder into the container so the backend can read engineers.csv
    volumes:
      - ./data:/app/data
    # wait until the database is healthy (not just started) before starting the backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillmatch-net

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - skillmatch-net

# my own network instead of the default one (the brief asks for a custom network)
networks:
  skillmatch-net:
    driver: bridge
