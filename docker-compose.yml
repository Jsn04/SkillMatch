# This file starts all three parts of the project together with one command:
#   docker compose up
# It also puts them on my own custom network so they can find each other.

services:
  db:
    image: postgres:15
    # the values come from a .env file. if there is no .env file, the part
    # after ":-" is used as a default so the project still runs out of the box.
    # these are only local development values, not real secrets.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-skillmatch}
    ports:
      - "5432:5432"
    networks:
      - skillmatch-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # the backend needs the same database settings so it can connect to the db container
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-skillmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-skillmatch}
    # share the data folder into the container so the backend can read engineers.csv
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    networks:
      - skillmatch-net

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    # share my frontend code into the container so editing a file on my machine updates
    # the running app straight away, without having to rebuild the image every time.
    # the second line keeps the container's own node_modules instead of hiding it with
    # the (empty) node_modules from my machine.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - skillmatch-net

# my own network instead of the default one (the brief asks for a custom network)
networks:
  skillmatch-net:
    driver: bridge
